name: "리팩터링"
description: "기존 코드를 리팩터링합니다"
labels: ["sdd:analyze"]
body:
  - type: markdown
    attributes:
      value: "## 리팩터링 요청"

  - type: textarea
    id: background
    attributes:
      label: "요청 배경"
      description: "현재 코드의 어떤 점이 문제인가요?"
      placeholder: |
        - 문제 / 동기:
        - 개선 방향:
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "리팩터링 설명"
      description: "무엇을 리팩터링해야 하나요?"
      placeholder: |
        - 한 줄 요약:
        - 대상 코드 경로:
        - 동작 변경 여부: (변경 없음 / 있음 — 있다면 상세 기술)
        - 참고 자료: (참고할 패턴, 문서 등)
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: "완료 기준 (Definition of Done)"
      description: "이 리팩터링이 완료된 것으로 간주되는 기준은?"
      placeholder: |
        - [ ] 기존 테스트 전체 통과
        - [ ] 외부 동작 변경 없음
        - [ ] 기준 3:
    validations:
      required: false
