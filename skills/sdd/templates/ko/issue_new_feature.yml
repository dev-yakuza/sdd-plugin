name: "새 기능"
description: "새 기능을 요청합니다"
labels: ["sdd:analyze"]
body:
  - type: markdown
    attributes:
      value: "## 새 기능 요청"

  - type: textarea
    id: background
    attributes:
      label: "요청 배경"
      description: "이 기능이 왜 필요한가요?"
      placeholder: |
        - 문제 / 동기:
        - 사용자 피드백: (있다면)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "기능 설명"
      description: "무엇을 만들어야 하나요?"
      placeholder: |
        - 한 줄 요약:
        - 상세 설명: (구체적인 동작 흐름, 사용 시나리오)
        - 대상 화면: (어떤 화면에 추가? 새 화면?)
        - 참고 자료: (스크린샷, 디자인 시안, 유사 앱 예시 등)
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: "완료 기준 (Definition of Done)"
      description: "이 기능이 완료된 것으로 간주되는 기준은?"
      placeholder: |
        - [ ] 기준 1:
        - [ ] 기준 2:
        - [ ] 기준 3:
    validations:
      required: false
