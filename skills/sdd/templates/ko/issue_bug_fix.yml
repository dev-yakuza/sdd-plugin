name: "버그 수정"
description: "버그를 보고하고 수정합니다"
labels: ["sdd:analyze"]
body:
  - type: markdown
    attributes:
      value: "## 버그 리포트"

  - type: textarea
    id: background
    attributes:
      label: "요청 배경"
      description: "이 버그를 어떻게 재현할 수 있나요?"
      placeholder: |
        - 재현 조건:
        - 현재 동작 (버그):
        - 기대 동작:
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "버그 상세"
      description: "버그에 대한 추가 정보"
      placeholder: |
        - 한 줄 요약:
        - 에러 로그 / 스택 트레이스: (있다면)
        - 스크린샷: (있다면)
        - 발생 환경: (OS, 기기, 앱 버전 등)
        - 관련 코드 경로: (알고 있다면)
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: "완료 기준 (Definition of Done)"
      description: "이 버그가 수정된 것으로 간주되는 기준은?"
      placeholder: |
        - [ ] 버그가 재현되지 않음
        - [ ] 기존 테스트 통과
        - [ ] 기준 3:
    validations:
      required: false
