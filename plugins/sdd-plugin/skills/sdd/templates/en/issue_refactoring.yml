name: "Refactoring"
description: "Refactor existing code"
labels: ["sdd:analyze"]
body:
  - type: markdown
    attributes:
      value: "## Refactoring Request"

  - type: textarea
    id: background
    attributes:
      label: "Background"
      description: "What is the problem with the current code?"
      value: |
        - Problem / Motivation:
        - Improvement direction:
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Refactoring Description"
      description: "What should be refactored?"
      value: |
        - Summary:
        - Target code path:
        - Behavior change: (no change / change - describe if changed)
        - References: (patterns, documents)
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: "Definition of Done"
      description: "When is this refactoring considered complete?"
      value: |
        - [ ] All existing tests pass
        - [ ] No external behavior change
        - [ ] Criteria 3:
    validations:
      required: true
